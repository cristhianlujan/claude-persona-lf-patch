      url_hash: "e5ef8029e79db297c9660fa9e44a6e1a"
      record_id: "6e803b37-a7ba-4ca3-a7c3-211532c13b67"
      operation_code: CAPTURE_REAL_CONTROLADA_V0_1
      record_status: TEST
      created_at: "2026-06-06T15:34:03.879Z"
      uso_en_evals: [EVAL_004, EVAL_012]
      comportamiento_esperado_gate_07:
        si_mismo_content_hash: BLOCKED_DUPLICATE_POLICY
        si_diferente_content_hash: REGISTERED_VERSION (si allow_new_version=true)
        si_mode_ADDENDUM_ONLY: ADDENDUM_REGISTERED

    - fixture_id: FIX_002
      label: RTC_CONSOLIDACION_DEUDAS
      url: "https://rtc.pe/prestamo-consolidacion-de-deudas"
