    Hashes url_hash reales presentes en lf_capture_records al momento del Lote 20B.
    El adapter debe verificar contra estos (y todos los demás en BD) en GATE_07
    antes de cualquier INSERT.
  verificado_en: "2026-06-07 (Lote 20B readback Supabase)"
  tabla_verificacion: public.lf_capture_records

  fixtures:

    - fixture_id: FIX_001
      label: REEVALUA_INFOCORP
