# example_bad_kambista.yaml
# ADAPTER_JIE_WEB_ARTICLE_CAPTURE_LF_CANDIDATO_V0_2
# Ejemplo de extracción INCORRECTA con diagnóstico completo por campo y gate
# Fuente: kambista.com · Estado: CANDIDATO / READ_ONLY · Lote 20B

ejemplo:
  id: EXAMPLE_BAD_001
  tipo: EXTRACCION_INCORRECTA
  fuente: kambista.com
  proposito: >
    Ilustrar los errores más comunes en una extracción web y cómo
    el adapter debe detectarlos y corregirlos. Cada error tiene:
    gate_fallido · campo_incorrecto · valor_incorrecto · valor_correcto · correccion.

input:
  mode: FULL_EXTRACTION_REGISTER
  actor_id: extractor_jie_demo_bad
  actor_role: extractor_operator
  urls: ["https://kambista.com/blog/tipo-de-cambio-hoy"]

errores_detectados:

  - error_id: ERR_001
    gate_fallido: GATE_08
    campo: autor_declarado
    valor_incorrecto: "Equipo Kambista"
    valor_correcto: NOT_FOUND
    razon_del_error: >
      "Equipo Kambista" no aparece en el texto visible de la página.
      Fue inferido por el operador porque la marca es conocida.
    regla_violada: "Campo no visible en texto → NOT_FOUND. Nunca inferir."
    correccion: >
      Si el autor no está en el HTML visible (byline, firma, meta author),
      el campo debe ser NOT_FOUND.
      No completar con el nombre de la empresa aunque sea conocido.

  - error_id: ERR_002
    gate_fallido: GATE_08
    campo: fecha_publicacion_declarada
    valor_incorrecto: "hoy"
    valor_correcto: NOT_FOUND  # o la fecha literal si visible, ej. "7 jun 2026"
    razon_del_error: >
      "hoy" es un valor relativo y ambiguo. No es literal de la página.
      La página puede decir "Actualizado: 7 jun 2026" o nada.
    regla_violada: "Solo registrar fecha literal visible. 'hoy', 'ayer', 'reciente' no son fechas."
    correccion: >
      Si la página dice "7 jun 2026" → fecha_publicacion_declarada = "7 jun 2026".
      Si no hay fecha visible → NOT_FOUND.
      Nunca calcular ni inferir la fecha desde contexto externo.

  - error_id: ERR_003
    gate_fallido: GATE_08
    campo: "claims_json[0].verificado_fuente_primaria"
    valor_incorrecto: true
    valor_correcto: false
    razon_del_error: >
      El adapter nunca accede a fuentes primarias (SBS, BCRP, etc.).
      verificado_fuente_primaria = true implicaría que el adapter fue al sitio de
      la SBS a confirmar el dato, lo cual no hace.
    regla_violada: "verificado_fuente_primaria es siempre false en este adapter."
    correccion: >
      Siempre false. Si el claim tiene un enlace a la fuente primaria,
      registrar en nota: "enlace a fuente presente, no verificado".

  - error_id: ERR_004
    gate_fallido: GATE_08
    campo: "claims_json[0].fuente_en_pagina"
    valor_incorrecto: null
    valor_correcto: "párrafo 2, sin enlace ni cita explícita"
    razon_del_error: >
      Un claim fue registrado pero sin anotar dónde aparece en la página.
      fuente_en_pagina null con claims presentes es inconsistente.
    regla_violada: "Todo claim debe tener fuente_en_pagina que indique su ubicación en el texto."
    correccion: >
      Si el claim aparece en párrafo 2 sin enlace: fuente_en_pagina = "párrafo 2, sin cita".
      Si el claim aparece con enlace: fuente_en_pagina = "párrafo 2, con enlace a X".
      Si no puedes ubicar la fuente en la página: no registrar el claim.

  - error_id: ERR_005
    gate_fallido: GATE_08 / GATE_09
    campo: raw_text
    valor_incorrecto: "Ver más en nuestra app. Descarga ahora."  # solo 45 chars
    valor_correcto: "texto completo del artículo (> 100 chars)"
    razon_del_error: >
      El fetch devolvió solo el texto del footer o un fragmento mínimo.
      El raw_text real del artículo tiene cientos de palabras.
      GATE_09 hubiera bloqueado porque raw_text < 100 chars.
    regla_violada: "raw_text debe ser ≥ 100 caracteres (GATE_09). Si está truncado: declarar truncado_en."
    correccion: >
      Si raw_text fue truncado: declarar truncado_en con posición aproximada
      y campos_truncados_json = ["raw_text"].
      Si el fetch solo devolvió el footer: reintentar con estrategia de extracción más amplia.
      Si no se puede obtener más contenido: GATE_09 bloquea → BLOCKED_MIN_EVIDENCE_NOT_MET.

  - error_id: ERR_006
    gate_fallido: GATE_08
    campo: estado_extraccion_web
    valor_incorrecto: COMPLETA  # o no declarado
    valor_correcto: EXTRACCION_PARCIAL
    razon_del_error: >
      raw_text estaba truncado (ERR_005) pero estado_extraccion_web fue declarado COMPLETA
      o no fue declarado.
    regla_violada: "Si raw_text truncado → estado_extraccion_web = EXTRACCION_PARCIAL."
    correccion: >
      Cuando truncado_en != null → estado_extraccion_web = EXTRACCION_PARCIAL.
      COMPLETA solo cuando raw_text tiene el artículo íntegro confirmado.

estado_con_errores:
  final_state_incorrecto: REGISTERED_NEW  # no debería haber llegado aquí con estos errores
  final_state_correcto: BLOCKED_MIN_EVIDENCE_NOT_MET  # por ERR_005 en GATE_09
  flow_terminated: true
  extraction_successful: false
  db_write_confirmed: false
  gate_fallido_correcto: GATE_09
  nota: >
    Con estos 6 errores, el adapter nunca debería haber llegado a GATE_12.
    GATE_09 hubiera bloqueado por raw_text insuficiente.
    Los errores ERR_001 a ERR_004 son de profundidad en GATE_08,
    no de bloqueo — el adapter los registra como extracción con baja calidad.
    ERR_005 y ERR_006 sí bloquean en GATE_09.

resumen_de_errores:
  total: 6
  errores_que_bloquean: 2  # ERR_005 (GATE_09), ERR_006 (estado incorrecto)
  errores_de_profundidad: 4  # ERR_001, ERR_002, ERR_003, ERR_004 (GATE_08)
  judge_J01_resultado: FAIL  # ERR_003 viola regla de verificado_fuente_primaria
  judge_J08_resultado: PASS  # ejemplo malo tiene ≥3 errores diagnosticados
