# db_field_mapping.yaml
# Campo extraído por el adapter → columna en lf_capture_records
# Adapter: ADAPTER_JIE_WEB_ARTICLE_CAPTURE_LF_CANDIDATO_V0_2
# Estado: CANDIDATO / READ_ONLY · Lote 20B
# Tabla target: public.lf_capture_records (RLS activo)

db_field_mapping:
  tabla: public.lf_capture_records
  created_by_valor_fijo: "ADAPTER_JIE_WEB_V0_2_CANDIDATO"
  nota: >
    Las columnas marcadas [PRE-EXISTENTE] estaban en la tabla antes del Lote 20B.
    Las marcadas [WEB v0.2] fueron añadidas por la migración extend_lf_capture_records_web_columns_v0_2.
    Las marcadas [AUTO] son asignadas automáticamente por la BD.

  # ──────────────────────────────────────────
  # COLUMNAS QUE EL ADAPTER DEBE PROVEER
  # ──────────────────────────────────────────

  campos_requeridos_en_insert:

    - campo_input: run_id (del INSERT previo a lf_capture_runs)
      columna: run_id
      tipo: uuid
      nullable: false
      origen: PRE-EXISTENTE

    - campo_input: operation_code del input_contract
      columna: operation_code
      tipo: text
      nullable: false
      valor_fijo: CAPTURE_INTAKE_MULTI_SOURCE_FIXTURE_V0_1
      origen: PRE-EXISTENTE

    - campo_input: url_final (post-redirección, de GATE_06)
      columna: url
      tipo: text
      nullable: false
      nota: Esta es url_final, no url_solicitada
      origen: PRE-EXISTENTE

    - campo_input: md5(url_final)
      columna: url_hash
      tipo: text
      nullable: false
      calculo: md5(url_final)
      origen: PRE-EXISTENTE

    - campo_input: content_type del artículo
      columna: content_type
      tipo: text
      nullable: false
      valor_recomendado: blog_article
      origen: PRE-EXISTENTE

    - campo_input: string literal "ADAPTER_JIE_WEB_V0_2_CANDIDATO"
      columna: created_by
      tipo: text
      nullable: false
      valor_fijo: ADAPTER_JIE_WEB_V0_2_CANDIDATO
      origen: PRE-EXISTENTE

  campos_opcionales_en_insert:

    - campo_input: md5(raw_text) si disponible
      columna: content_hash
      tipo: text
      nullable: true
      uso: GATE_07 lo usa para detectar versiones actualizadas
      origen: PRE-EXISTENTE

    - campo_input: plataforma de la fuente
      columna: platform
      tipo: text
      nullable: true
      valor_recomendado: web
      origen: PRE-EXISTENTE

    - campo_input: source_type de sbx_competitive_sources
      columna: source_type
      tipo: text
      nullable: true
      ejemplos: [blog_article, educational_blog, fintech_blog]
      origen: PRE-EXISTENTE

    - campo_input: fecha de publicación si disponible
      columna: published_at
      tipo: timestamp with time zone
      nullable: true
      nota: Solo si fecha_publicacion_declarada es parseaable como fecha
      origen: PRE-EXISTENTE

    - campo_input: title_or_hook extraído en GATE_08
      columna: title_or_hook
      tipo: text
      nullable: true
      origen: PRE-EXISTENTE

    - campo_input: raw_text extraído en GATE_08
      columna: raw_text
      tipo: text
      nullable: true
      origen: PRE-EXISTENTE

    - campo_input: cta principal (texto del primer CTA si hay solo uno)
      columna: cta
      tipo: text
      nullable: true
      nota: Para CTAs múltiples usar ctas_json [WEB v0.2]
      origen: PRE-EXISTENTE

    - campo_input: etapa del funnel detectada
      columna: funnel_stage
      tipo: text
      nullable: true
      ejemplos: [awareness, consideration, decision]
      origen: PRE-EXISTENTE

    - campo_input: sentimiento visible del artículo
      columna: sentiment_visible
      tipo: text
      nullable: true
      ejemplos: [positivo, neutro, negativo, alarmista]
      origen: PRE-EXISTENTE

    - campo_input: nivel de confianza de la captura
      columna: capture_confidence
      tipo: text
      nullable: false
      default_bd: MEDIA
      valores: [ALTA, MEDIA, BAJA]
      origen: PRE-EXISTENTE

    - campo_input: nivel de riesgo general
      columna: risk_level
      tipo: text
      nullable: false
      default_bd: BAJO
      origen: PRE-EXISTENTE

    - campo_input: riesgo de copia de contenido
      columna: copy_risk
      tipo: text
      nullable: false
      default_bd: BAJO
      origen: PRE-EXISTENTE

    - campo_input: riesgo legal del contenido
      columna: legal_risk
      tipo: text
      nullable: false
      default_bd: BAJO
      origen: PRE-EXISTENTE

    - campo_input: estado del registro
      columna: record_status
      tipo: text
      nullable: false
      default_bd: ACTIVE
      valor_para_sandbox: TEST
      origen: PRE-EXISTENTE

    - campo_input: motivo de salto si no se inserta
      columna: skip_reason
      tipo: text
      nullable: true
      uso: Completar si final_state es BLOCKED_*
      origen: PRE-EXISTENTE

    - campo_input: motivo de duplicado si aplica
      columna: duplicate_reason
      tipo: text
      nullable: true
      uso: Completar si final_state es BLOCKED_DUPLICATE_POLICY
      origen: PRE-EXISTENTE

    - campo_input: id del evento lf_log_operativo asociado
      columna: evidence_event_id
      tipo: bigint
      nullable: true
      uso: Vincular al evento de GATE_14
      origen: PRE-EXISTENTE

    - campo_input: payload completo de la extracción
      columna: raw_payload
      tipo: jsonb
      nullable: false
      default_bd: "{}"
      contenido_recomendado: >
        http_status, tiempo_respuesta, gates_ejecutados, notas_tecnicas,
        competitor_id si encontrado en GATE_04
      origen: PRE-EXISTENTE

  # ──────────────────────────────────────────
  # COLUMNAS AÑADIDAS POR WEB v0.2
  # ──────────────────────────────────────────

  campos_web_v0_2:

    - campo_input: url_solicitada (URL original del input, de GATE_06)
      columna: url_solicitada
      tipo: text
      nullable: true
      nota: Puede diferir de url (url_final) si hubo redirección
      origen: WEB v0.2

    - campo_input: redireccion_detectada (de GATE_06)
      columna: redireccion_detectada
      tipo: boolean
      nullable: false
      default_bd: false
      calculo: url_solicitada != url (url_final)
      origen: WEB v0.2

    - campo_input: autor_declarado (de GATE_08)
      columna: autor_declarado
      tipo: text
      nullable: true
      valor_si_no_visible: NOT_FOUND
      origen: WEB v0.2

    - campo_input: fecha_publicacion_declarada (de GATE_08)
      columna: fecha_publicacion_declarada
      tipo: text
      nullable: true
      valor_si_no_visible: NOT_FOUND
      origen: WEB v0.2

    - campo_input: meta_description del <head>
      columna: meta_description
      tipo: text
      nullable: true
      origen: WEB v0.2

    - campo_input: tiempo_lectura_declarado si visible en página
      columna: tiempo_lectura_declarado
      tipo: text
      nullable: true
      ejemplo: "5 minutos de lectura"
      origen: WEB v0.2

    - campo_input: primer párrafo literal (de GATE_08)
      columna: lead_literal
      tipo: text
      nullable: true
      origen: WEB v0.2

    - campo_input: claims_json (ver extraction_fields.schema.yaml)
      columna: claims_json
      tipo: jsonb
      nullable: false
      default_bd: "[]"
      origen: WEB v0.2

    - campo_input: ctas_json (ver extraction_fields.schema.yaml)
      columna: ctas_json
      tipo: jsonb
      nullable: false
      default_bd: "[]"
      origen: WEB v0.2

    - campo_input: senales_confianza_json (de GATE_08)
      columna: senales_confianza_json
      tipo: jsonb
      nullable: false
      default_bd: "[]"
      origen: WEB v0.2

    - campo_input: antipatrones_json (de GATE_08)
      columna: antipatrones_json
      tipo: jsonb
      nullable: false
      default_bd: "[]"
      origen: WEB v0.2

    - campo_input: producto_mencionado_json (de GATE_08)
      columna: producto_mencionado_json
      tipo: jsonb
      nullable: true
      origen: WEB v0.2

    - campo_input: truncado_en (de GATE_08 si hay truncamiento)
      columna: truncado_en
      tipo: text
      nullable: true
      origen: WEB v0.2

    - campo_input: campos_truncados_json (de GATE_08 si hay truncamiento)
      columna: campos_truncados_json
      tipo: jsonb
      nullable: false
      default_bd: "[]"
      origen: WEB v0.2

    - campo_input: prompt_injection_detectado (de GATE_08)
      columna: prompt_injection_detectado
      tipo: boolean
      nullable: false
      default_bd: false
      origen: WEB v0.2

    - campo_input: prompt_injection_fragmento (de GATE_08 si detectado)
      columna: prompt_injection_fragmento
      tipo: text
      nullable: true
      origen: WEB v0.2

    - campo_input: mode del input_contract
      columna: modo_ejecucion
      tipo: text
      nullable: true
      origen: WEB v0.2

    - campo_input: actor_id del input_contract
      columna: actor_id
      tipo: text
      nullable: true
      origen: WEB v0.2

    - campo_input: actor_role del input_contract
      columna: actor_role
      tipo: text
      nullable: true
      origen: WEB v0.2

    - campo_input: estado_extraccion_web (de GATE_15)
      columna: estado_extraccion_web
      tipo: text
      nullable: true
      valores: [COMPLETA, EXTRACCION_PARCIAL, BLOCKED_404_RECORDED, etc.]
      origen: WEB v0.2

    - campo_input: fecha_proxima_revision (de GATE_15)
      columna: fecha_proxima_revision
      tipo: date
      nullable: true
      calculo: "30d/90d/180d según contenido"
      origen: WEB v0.2

  # ──────────────────────────────────────────
  # COLUMNAS AUTO-GENERADAS (no proveer en INSERT)
  # ──────────────────────────────────────────

  columnas_auto:
    - columna: record_id
      tipo: uuid
      asignacion: gen_random_uuid() automático
    - columna: captured_at
      tipo: timestamp
      asignacion: now() automático
    - columna: created_at
      tipo: timestamp
      asignacion: now() automático
    - columna: updated_at
      tipo: timestamp
      asignacion: now() automático
