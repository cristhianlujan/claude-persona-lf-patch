# query_contract.yaml
# Query: get_web_capture_readback
# Owner: SKILL_JIE_OBSERVATION_INTAKE_LF_CANDIDATO_V0_1
# Estado: CANDIDATO_READ_ONLY · Lote 20B

query:
  id:          get_web_capture_readback
  owner_skill: SKILL_JIE_OBSERVATION_INTAKE_LF_CANDIDATO_V0_1
  estado:      CANDIDATO_READ_ONLY
  tipo:        READ_ONLY

  descripcion: >
    Query de lectura y verificación de registros de captura web.
    No escribe. No modifica. No infiere.
    Separa explícitamente la lectura/readback de cualquier escritura (Commands).

  proposito:
    - Verificar que un record_id existe en lf_capture_records
    - Leer el estado de una corrida en lf_capture_runs
    - Confirmar evidencia de extracción antes de revisión posterior

  tablas_accedidas:
    - tabla: lf_capture_records
      operacion: SELECT
    - tabla: lf_capture_runs
      operacion: SELECT
    - tabla: lf_log_operativo
      operacion: SELECT

  no_escribe_en:
    - lf_capture_records
    - lf_capture_runs
    - lf_capture_judge_results
    - ninguna tabla de producción

  input:
    campos_requeridos:
      - nombre: query_type
        tipo: enum
        valores: [by_record_id, by_run_id, by_url_hash, by_operation_code]

      - nombre: actor_id
        tipo: string
        restriccion: no vacío

      - nombre: actor_role
        tipo: enum
        valores: [viewer, extractor_operator, register_operator, kb_curator, admin_sandbox]

    campos_opcionales:
      - nombre: record_id
        tipo: uuid
        requerido_si: query_type=by_record_id

      - nombre: run_id
        tipo: uuid
        requerido_si: query_type=by_run_id

      - nombre: url_hash
        tipo: string
        requerido_si: query_type=by_url_hash

      - nombre: operation_code
        tipo: string
        requerido_si: query_type=by_operation_code

      - nombre: limit
        tipo: integer
        default: 10
        maximo: 50

  output:
    descripcion: Ver read_model.md para estructura completa
    invariantes:
      - "query_executed: true siempre"
      - "writes_performed: false siempre"
      - "resultado puede ser vacío — no es error"

  bloqueos:
    - "No puede escribir en ninguna tabla"
    - "No puede homologar ni promover registros"
    - "No puede invocar el command capture_web_article"
    - "No puede generar insight ni alert"
