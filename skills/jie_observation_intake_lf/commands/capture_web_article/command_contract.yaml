# command_contract.yaml
# Command: capture_web_article
# Owner: SKILL_JIE_OBSERVATION_INTAKE_LF_CANDIDATO_V0_1
# Estado: CANDIDATO_READ_ONLY · Lote 20B

command:
  id:            capture_web_article
  asset_code:    ACT-0052
  canonical_name: SKILL_EXTRACCION_FUENTES_DIGITALES_LF
  legacy_skill_id: SKILL_JIE_OBSERVATION_INTAKE_LF_CANDIDATO_V0_1
  owner_skill:   SKILL_JIE_OBSERVATION_INTAKE_LF_CANDIDATO_V0_1
  child_adapter: ADAPTER_JIE_WEB_ARTICLE_CAPTURE_LF_CANDIDATO_V0_2
  operation_code: CAPTURE_INTAKE_MULTI_SOURCE_FIXTURE_V0_1
  estado:        CANDIDATO_READ_ONLY

  descripcion: >
    Command que orquesta la captura de artículos web de fuentes fintech peruanas.
    Ejecuta GATE_00–GATE_15 y persiste en lf_capture_records si el modo lo permite.
    Cualquier escritura real queda bloqueada salvo sandbox autorizado explícitamente.

  # ─── MODOS DISPONIBLES ────────────────────────────────────────────────────
  modos:
    FULL_EXTRACTION_REGISTER_SANDBOX_ONLY:
      descripcion: Extracción completa con escritura en BD sandbox
      escritura: true
      sandbox_only: true
      requiere: readback posterior (GATE_13)
      bloqueado_en: producción · runtime real · n8n · sin autorización explícita

    DRY_RUN:
      descripcion: Simulación sin escritura en BD
      escritura: false
      sandbox_only: true

    READ_ONLY_RESULT:
      descripcion: Solo lectura del resultado sin escritura
      escritura: false

    ADDENDUM_ONLY:
      descripcion: Añadir addendum a registro existente
      escritura: true
      sandbox_only: true
      requiere: target_record_id o URL de registro existente

    ADMIN_OVERRIDE:
      descripcion: Override administrativo
      estado: FUTURE_BLOCKED_NO_HOMOLOGATION
      disponible: false
      desbloqueado_cuando:
        - actor admin identificado en lf_operation_registry
        - admin_override_reason documentado
        - evidencia registrada en lf_log_operativo
        - log obligatorio WEB_EXTRACTION_ADMIN_OVERRIDE
        - sin bypass de GATE_00 ni GATE_13
        - sin producción
      nota: BLOQUEADO POR DEFECTO. No usar en sandbox sin aprobación explícita.

  # ─── PRE-CONDICIONES ──────────────────────────────────────────────────────
  pre_condiciones:
    - operation_code existe en lf_operation_registry (verificado en GATE_00)
    - actor_role tiene permiso para el modo (verificado en GATE_01)
    - URLs tienen formato https:// o http:// (verificado en GATE_03)
    - Ambiente es sandbox — no producción

  # ─── ESCRITURA ────────────────────────────────────────────────────────────
  escritura:
    tablas: [lf_capture_runs, lf_capture_records, lf_log_operativo]
    created_by_valor_fijo: ADAPTER_JIE_WEB_V0_2_CANDIDATO
    readback_obligatorio: true  # GATE_13 siempre

  # ─── LECTURA ──────────────────────────────────────────────────────────────
  lectura:
    tablas: [lf_log_config, lf_operation_registry, sbx_competitive_sources, lf_capture_records]

  # ─── HANDOFF ──────────────────────────────────────────────────────────────
  handoff:
    permitido:
      - destino: revisión_posterior_operador_humano
        condicion: extraction_successful=true AND db_write_confirmed=true
        entrega: record_id + run_id

    bloqueado:
      - homologacion: FUTURE_BLOCKED_NO_HOMOLOGATION
      - insight_automatico: FUTURE_BLOCKED_NO_HOMOLOGATION
      - alert_automatico: FUTURE_BLOCKED_NO_HOMOLOGATION
      - kb_final: FUTURE_BLOCKED_NO_HOMOLOGATION
      - n8n: FUTURE_BLOCKED_NO_HOMOLOGATION

  # ─── GATES ────────────────────────────────────────────────────────────────
  gates:
    total: 16
    rango: GATE_00 a GATE_15
    detalle: ver gates.md

  # ─── CONTRATOS ────────────────────────────────────────────────────────────
  contratos:
    entrada: input_contract.yaml
    salida:  output_contract.yaml
    judge:   judge.yaml
    evals:   evals.yaml
