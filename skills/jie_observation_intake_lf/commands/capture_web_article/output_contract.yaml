# output_contract_v2.yaml
# ADAPTER_JIE_WEB_ARTICLE_CAPTURE_LF_CANDIDATO_V0_2
# Estado: CANDIDATO / READ_ONLY · Lote 20B

output_contract:
  version: v2
  adapter: ADAPTER_JIE_WEB_ARTICLE_CAPTURE_LF_CANDIDATO_V0_2
  gate_de_validacion: GATE_15_FINAL_STATE

  invariantes_obligatorias:
    flow_terminated: true
    no_homologation: true
    no_insight: true
    no_alert: true
    no_n8n: true
    no_validated: true

  campos_requeridos:
    - nombre: run_id
      tipo: uuid
      nullable: false
      descripcion: ID de corrida en lf_capture_runs

    - nombre: flow_terminated
      tipo: boolean
      valor_obligatorio: true
      descripcion: Debe ser true en todos los caminos, incluidos bloqueos

    - nombre: final_state
      tipo: enum
      valores:
        - REGISTERED_NEW
        - REGISTERED_VERSION
        - ADDENDUM_REGISTERED
        - DRY_RUN_PREVIEW_READY
        - READ_ONLY_RESULT
        - BLOCKED_404_RECORDED
        - BLOCKED_DUPLICATE_POLICY
        - BLOCKED_PERMISSION_DENIED
        - BLOCKED_INVALID_INPUT_CONTRACT
        - BLOCKED_URL_INVALID
        - BLOCKED_FETCH_FAILED
        - BLOCKED_MIN_EVIDENCE_NOT_MET
        - BLOCKED_DB_WRITE_FAILED
        - BLOCKED_DB_READBACK_FAILED
        - BLOCKED_OPERATION_CODE_INVALID
        - BLOCKED_PARTIAL_EXECUTION
        - EXTRACCION_PARCIAL
        - ADMIN_OVERRIDE_RECORDED
      descripcion: Estado final de la corrida o registro

    - nombre: records
      tipo: array[object]
      descripcion: Registros procesados o bloqueados

  record_schema:
    campos:
      - record_id: uuid | null
      - url: string
      - url_final: string | null
      - url_hash: string | null
      - content_hash: string | null
      - estado_extraccion_web: enum
      - extraction_successful: boolean
      - db_write_confirmed: boolean
      - evidence_layer: enum [literal, technical_note, tagged_inference]
      - blocked_reason: string | null
      - log_event_ids: array[bigint]

  estados_exitosos:
    REGISTERED_NEW:
      extraction_successful: true
      db_write_confirmed: true
      requiere_record_id: true

    REGISTERED_VERSION:
      extraction_successful: true
      db_write_confirmed: true
      requiere_record_id: true
      requiere_parent_record_id: true

    ADDENDUM_REGISTERED:
      extraction_successful: true
      db_write_confirmed: true
      requiere_parent_record_id: true

    EXTRACCION_PARCIAL:
      extraction_successful: true
      db_write_confirmed: true
      requiere_truncado_en: true
      requiere_campos_truncados_json: true

  estados_sin_escritura:
    DRY_RUN_PREVIEW_READY:
      extraction_successful: false
      db_write_confirmed: false
      nota: No es error; por diseño no escribe

    READ_ONLY_RESULT:
      extraction_successful: false
      db_write_confirmed: false
      nota: No es error; modo solo lectura

  estados_bloqueados:
    - BLOCKED_404_RECORDED
    - BLOCKED_DUPLICATE_POLICY
    - BLOCKED_PERMISSION_DENIED
    - BLOCKED_INVALID_INPUT_CONTRACT
    - BLOCKED_URL_INVALID
    - BLOCKED_FETCH_FAILED
    - BLOCKED_MIN_EVIDENCE_NOT_MET
    - BLOCKED_DB_WRITE_FAILED
    - BLOCKED_DB_READBACK_FAILED
    - BLOCKED_OPERATION_CODE_INVALID
    - BLOCKED_PARTIAL_EXECUTION

  metadata_obligatoria:
    - operation_code
    - actor_id
    - actor_role
    - modo_ejecucion
    - created_by
    - timestamp_utc

  handoff:
    permitido_si:
      - final_state in [REGISTERED_NEW, REGISTERED_VERSION, ADDENDUM_REGISTERED, EXTRACCION_PARCIAL]
      - db_write_confirmed == true
      - extraction_successful == true
    destino: revision_posterior_operador_humano

    bloqueado:
      homologation: FUTURE_BLOCKED_NO_HOMOLOGATION
      insight: FUTURE_BLOCKED_NO_HOMOLOGATION
      alert: FUTURE_BLOCKED_NO_HOMOLOGATION
      kb_final: FUTURE_BLOCKED_NO_HOMOLOGATION
