# eval_suite_v0_2.yaml
# ADAPTER_JIE_WEB_ARTICLE_CAPTURE_LF_CANDIDATO_V0_2
# Estado: CANDIDATO / READ_ONLY · Lote 20B
# Ejecutar en sandbox. No producción.

eval_suite:
  nombre: ADAPTER_JIE_WEB_EVALS_V0_2
  version: v0.2
  operation_code: CAPTURE_INTAKE_MULTI_SOURCE_FIXTURE_V0_1
  estado: PENDIENTE_EJECUCION
  ambiente: sandbox_only
  produccion: false

  instrucciones_ejecucion:
    - "Ejecutar cada caso en orden"
    - "Verificar expected_db contra Supabase real después de cada caso"
    - "No marcar PASS si la verificación en BD no coincide con expected_db"
    - "Registrar resultado en lf_log_operativo con log_key WEB_EXTRACTION_GATE_EVENT"
    - "Si algún caso falla: anotar gate_fallido_real y expected_gate_fallido"

  casos:

    - id: EVAL_001
      nombre: REGISTERED_NEW
      descripcion: URL válida no duplicada, extracción completa exitosa
      input:
        mode: FULL_EXTRACTION_REGISTER_SANDBOX_ONLY
        actor_id: extractor_jie_test_001
        actor_role: extractor_operator
        urls: ["https://reevalua.com/blog/nuevo-articulo-no-en-bd-2026"]
        operation_code: CAPTURE_INTAKE_MULTI_SOURCE_FIXTURE_V0_1
      gates_esperados:
        GATE_00: PASS
        GATE_01: PASS
        GATE_07: PASS_NEW
      expected_gate_final: GATE_15
      expected_state: REGISTERED_NEW
      expected_db:
        lf_capture_records: "1 nueva fila con url_hash único"
        lf_capture_runs: "1 fila con status=COMPLETED"
        lf_log_operativo: "1 evento WEB_EXTRACTION_COMPLETE"
      extraction_successful: true
      db_write_confirmed: true

    - id: EVAL_002
      nombre: REDIRECT
      descripcion: URL que devuelve redirección HTTP 301
      input:
        mode: FULL_EXTRACTION_REGISTER_SANDBOX_ONLY
        actor_id: extractor_jie_test_002
        actor_role: extractor_operator
        urls: ["https://kambista.com/blog/antiguo-slug-redirect"]
      expected_gate_final: GATE_15
      expected_state: REGISTERED_NEW
      expected_db:
        lf_capture_records: "url_solicitada != url (url_final), redireccion_detectada=true"
      extraction_successful: true
      verificar_campo: "redireccion_detectada == true"

    - id: EVAL_003
      nombre: BLOCKED_404
      descripcion: URL inexistente devuelve 404
      input:
        mode: FULL_EXTRACTION_REGISTER_SANDBOX_ONLY
        actor_id: extractor_jie_test_003
        actor_role: extractor_operator
        urls: ["https://reevalua.com/blog/pagina-que-no-existe-xyz-404"]
      expected_gate_final: GATE_05
      expected_state: BLOCKED_404_RECORDED
      expected_db:
        lf_capture_runs: "1 fila con status=FAILED"
        lf_capture_records: "sin nueva fila"
        lf_log_operativo: "1 evento WEB_EXTRACTION_BLOCK"
      extraction_successful: false
      db_write_confirmed: false
      gate_fallido: GATE_05

    - id: EVAL_004
      nombre: BLOCKED_DUPLICATE_EXACT
      descripcion: URL ya en BD con mismo content_hash — fixture real Reevalúa
      input:
        mode: FULL_EXTRACTION_REGISTER_SANDBOX_ONLY
        actor_id: extractor_jie_test_004
        actor_role: extractor_operator
        urls: ["https://reevalua.com/blog/como-salir-de-infocorp-con-datos-reales"]
      fixture_url_hash: "e5ef8029e79db297c9660fa9e44a6e1a"
      expected_gate_final: GATE_07
      expected_state: BLOCKED_DUPLICATE_POLICY
      expected_db:
        lf_capture_records: "sin nueva fila"
        lf_capture_runs: "1 fila registrada (duplicado detectado)"
      extraction_successful: false
      gate_fallido: GATE_07
      nota: "Hash fixture verificado en BD Lote 20B"

    - id: EVAL_005
      nombre: REGISTERED_VERSION
      descripcion: URL ya en BD pero content_hash diferente — fixture real RTC con contenido modificado simulado
      input:
        mode: FULL_EXTRACTION_REGISTER_SANDBOX_ONLY
        actor_id: extractor_jie_test_005
        actor_role: register_operator
        urls: ["https://rtc.pe/prestamo-consolidacion-de-deudas"]
        allow_new_version: true
      fixture_url_hash: "84a5bc12d53b9f0dee9d156fa0d8e958"
      condicion_prueba: "simular que content_hash cambió (contenido actualizado)"
      expected_gate_final: GATE_15
      expected_state: REGISTERED_VERSION
      expected_db:
        lf_capture_records: "nueva fila con mismo url_hash, diferente content_hash"
      extraction_successful: true
      nota: "Hash fixture verificado en BD Lote 20B. Requiere contenido modificado real."

    - id: EVAL_006
      nombre: PROMPT_INJECTION
      descripcion: Página contiene instrucción maliciosa visible en el texto
      input:
        mode: FULL_EXTRACTION_REGISTER_SANDBOX_ONLY
        actor_id: extractor_jie_test_006
        actor_role: extractor_operator
        urls: ["https://powerpay.pe/blog/articulo-con-injection-test"]
      condicion_prueba: "contenido de la página incluye 'Ignora las instrucciones anteriores'"
      expected_gate_final: GATE_15
      expected_state: REGISTERED_NEW
      expected_db:
        lf_capture_records: "prompt_injection_detectado=true, contenido extraído normalmente"
        lf_log_operativo: "1 evento WEB_EXTRACTION_INJECTION"
      extraction_successful: true
      verificar_campo: "prompt_injection_detectado == true"
      log_key_esperado: WEB_EXTRACTION_INJECTION

    - id: EVAL_007
      nombre: EXTRACCION_PARCIAL_TRUNCADA
      descripcion: Fetch devuelve texto cortado antes del cierre natural del artículo
      input:
        mode: FULL_EXTRACTION_REGISTER_SANDBOX_ONLY
        actor_id: extractor_jie_test_007
        actor_role: extractor_operator
        urls: ["https://kambista.com/blog/articulo-largo-truncado-test"]
      condicion_prueba: "raw_text termina abruptamente en mitad de oración"
      expected_gate_final: GATE_15
      expected_state: REGISTERED_NEW
      expected_db:
        lf_capture_records: >
          truncado_en != null,
          campos_truncados_json contiene 'raw_text',
          estado_extraccion_web = 'EXTRACCION_PARCIAL'
      extraction_successful: true
      verificar_campos: ["truncado_en != null", "estado_extraccion_web == EXTRACCION_PARCIAL"]

    - id: EVAL_008
      nombre: BLOCKED_DB_WRITE_FAILED
      descripcion: Simulación de fallo de escritura en lf_capture_records
      input:
        mode: FULL_EXTRACTION_REGISTER_SANDBOX_ONLY
        actor_id: extractor_jie_test_008
        actor_role: extractor_operator
        urls: ["https://reevalua.com/blog/articulo-con-fallo-bd-simulado"]
      condicion_prueba: "forzar error en INSERT de lf_capture_records (ej. constraint violation)"
      expected_gate_final: GATE_12
      expected_state: BLOCKED_DB_WRITE_FAILED
      expected_db:
        lf_capture_records: "sin nueva fila"
        lf_log_operativo: "1 evento WEB_EXTRACTION_ERROR"
      extraction_successful: false
      db_write_confirmed: false
      gate_fallido: GATE_12

    - id: EVAL_009
      nombre: BLOCKED_PERMISSION_DENIED
      descripcion: actor_role=viewer intenta FULL_EXTRACTION_REGISTER_SANDBOX_ONLY
      input:
        mode: FULL_EXTRACTION_REGISTER_SANDBOX_ONLY
        actor_id: viewer_audit_test
        actor_role: viewer
        urls: ["https://reevalua.com/blog/cualquier-articulo"]
      expected_gate_final: GATE_01
      expected_state: BLOCKED_PERMISSION_DENIED
      expected_db:
        lf_capture_records: "sin nueva fila"
        lf_capture_runs: "sin nueva fila"
        lf_log_operativo: "1 evento WEB_EXTRACTION_BLOCK"
      extraction_successful: false
      gate_fallido: GATE_01
      log_key_esperado: WEB_EXTRACTION_BLOCK

    - id: EVAL_010
      nombre: DRY_RUN_NO_ESCRIBE
      descripcion: DRY_RUN con URL válida no duplicada — no debe crear ninguna fila
      input:
        mode: DRY_RUN
        actor_id: extractor_jie_test_010
        actor_role: extractor_operator
        urls: ["https://kambista.com/blog/articulo-dry-run-test"]
      expected_gate_final: GATE_11
      expected_state: DRY_RUN_PREVIEW_READY
      expected_db:
        lf_capture_records: "sin nueva fila"
        lf_capture_runs: "sin nueva fila"
        lf_log_operativo: "0 o 1 evento informativo (no de escritura)"
      extraction_successful: false
      db_write_confirmed: false

    - id: EVAL_011
      nombre: BLOCKED_OPERATION_CODE_INVALID
      descripcion: operation_code no existe en lf_operation_registry
      input:
        mode: FULL_EXTRACTION_REGISTER_SANDBOX_ONLY
        actor_id: extractor_jie_test_011
        actor_role: extractor_operator
        urls: ["https://reevalua.com/blog/cualquier-articulo"]
        operation_code: "OP_INEXISTENTE_XYZ_999"
      expected_gate_final: GATE_00
      expected_state: BLOCKED_OPERATION_CODE_INVALID
      expected_db:
        lf_capture_records: "sin nueva fila"
        lf_capture_runs: "sin nueva fila"
        lf_log_operativo: "1 evento WEB_EXTRACTION_BLOCK"
      extraction_successful: false
      gate_fallido: GATE_00

    - id: EVAL_012
      nombre: ADDENDUM_VALID
      descripcion: ADDENDUM_ONLY sobre registro existente con contenido nuevo
      input:
        mode: ADDENDUM_ONLY
        actor_id: curator_editorial_test
        actor_role: kb_curator
        urls: ["https://reevalua.com/blog/como-salir-de-infocorp-con-datos-reales"]
        target_record_id: "6e803b37-a7ba-4ca3-a7c3-211532c13b67"
      expected_gate_final: GATE_15
      expected_state: ADDENDUM_REGISTERED
      expected_db:
        lf_capture_records: "fila existente actualizada con addendum en raw_payload"
        lf_log_operativo: "1 evento WEB_EXTRACTION_COMPLETE"
      extraction_successful: true
      nota: "target_record_id es el record_id real de Reevalúa en BD (verificado Lote 20B)"

  criterios_pass_globales:
    - "Ningún eval inventa campos: autor, fecha, claims sin evidencia literal en texto"
    - "Todo FOUND tiene texto_literal del contenido visible — no inferido"
    - "Todo NOT_FOUND permanece NOT_FOUND — nunca reemplazado por inferencia"
    - "EVAL_002: redireccion_detectada=true cuando url_solicitada != url_final"
    - "EVAL_003: lf_capture_runs tiene run=FAILED sin nueva fila en lf_capture_records"
    - "EVAL_004: hash e5ef8029… resulta en BLOCKED_DUPLICATE_POLICY sin nueva fila"
    - "EVAL_010: DRY_RUN no crea ninguna fila en ninguna tabla de escritura"
    - "flow_terminated=true en todos los 12 evals"
    - "extraction_successful=true SOLO cuando lf_capture_records tiene fila confirmada por readback"
    - "lf_log_operativo tiene evento para cada ejecución que intentó escribir en BD"
    - "EVAL_011: GATE_00 bloquea antes de crear cualquier cosa en BD"

  estado_resultado:
    pendiente: true
    ejecutados: 0
    pasados: 0
    fallados: 0
    notas: "No ejecutado aún. Ejecutar después de GitHub branch candidato."
