operation_code: CREACION_ADAPTER_LF
version: "v0.1-CANDIDATO"
status: CANDIDATO
description: >
  Contratos declarativos de gobernanza para la operación CREACION_ADAPTER_LF.
  Define puertas de control críticas para prevenir alucinaciones del LLM en la
  creación de adapters. Los contratos profundos con mini_judge_code residen en
  Supabase (lf_operation_step_contracts). Este archivo es la capa declarativa
  de referencia para GitHub y CI.

supabase_ref:
  project_id: mhwmirqcgxxukpctffuv
  table: lf_operation_step_contracts
  filter: "operation_code = 'CREACION_ADAPTER_LF'"
  steps_table: lf_operation_steps
  steps_filter: "operation_code = 'CREACION_ADAPTER_LF'"

reglas_madre:
  - No ejecutar paso siguiente sin evidencia del paso actual registrada
  - No inventar fuentes, activos, adapters ni decisiones
  - No crear adapter sin verificar duplicidad previa
  - Estado máximo inicial: CANDIDATO/SANDBOX/READ_ONLY
  - Toda escritura GitHub requiere write_plan autorizado + pre-write gate

# ------------------------------------------------------------------------------
# CONTRATOS CRÍTICOS — cobertura actual (Lote 20B/20C)
# Steps con contrato completo + mini_judge_code en Supabase
# ------------------------------------------------------------------------------

steps:

  - step_id: router
    step_order: 1
    required: true
    evidence_required: router_read
    contract_code: CONTRACT_CREACION_ADAPTER_LF_ROUTER_V1
    mini_judge_code: MINI_JUDGE_CREACION_ADAPTER_LF_ROUTER_V1
    status: ACTIVE
    purpose: >
      Determinar que la solicitud pertenece al flujo operativo correcto
      y no entrar directo a adapters sin Router.
    input_required:
      step_input: solicitud_operativa
    output_payload:
      router_read: true
      step_result: "PASS|BLOCKED"
      blocking_codes: []
    pass_condition:
      must_have_evidence: router_read
      must_not_be_generic: true
      must_match_step_purpose: true
      required_if_step_required: true
    block_condition:
      scope_bypass: true
      generic_payload: true
      missing_evidence: router_read
      invented_source_or_destination: true
    blocking_code: BLOCKED_ROUTER_NOT_READ
    required_evidence_keys:
      - router_read
      - step_result
      - blocking_codes
    next_if_pass: NEXT_BY_EXECUTION_ORDER
    next_if_blocked: RETURN_TO_WORKER_FOR_SELF_REPAIR_OR_BACKEND_CONFIG
    notes: "Contrato crítico — puerta de entrada adapter."

  - step_id: operational_source
    step_order: 2
    required: true
    evidence_required: source_read
    contract_code: CONTRACT_CREACION_ADAPTER_LF_OPERATIONAL_SOURCE_V1
    mini_judge_code: MINI_JUDGE_CREACION_ADAPTER_LF_OPERATIONAL_SOURCE_V1
    status: ACTIVE
    purpose: >
      Leer fuente operativa vigente en Supabase y confirmar que la operación
      puede continuar con activo vigente.
    input_required:
      step_input: supabase_query
    output_payload:
      source_read: true
      step_result: "PASS|BLOCKED"
      blocking_codes: []
    pass_condition:
      must_have_evidence: source_read
      must_not_be_generic: true
      must_match_step_purpose: true
      required_if_step_required: true
    block_condition:
      scope_bypass: true
      generic_payload: true
      missing_evidence: source_read
      invented_source_or_destination: true
    blocking_code: BLOCKED_OPERATIONAL_SOURCE_NOT_READ
    required_evidence_keys:
      - source_read
      - step_result
      - blocking_codes
    next_if_pass: NEXT_BY_EXECUTION_ORDER
    next_if_blocked: RETURN_TO_WORKER_FOR_SELF_REPAIR_OR_BACKEND_CONFIG
    notes: "Contrato crítico — fuente operativa adapter."

  - step_id: duplicate_check
    step_order: 5
    required: true
    evidence_required: duplicate_checked
    contract_code: CONTRACT_CREACION_ADAPTER_LF_DUPLICATE_CHECK_V1
    mini_judge_code: MINI_JUDGE_CREACION_ADAPTER_LF_DUPLICATE_CHECK_V1
    status: ACTIVE
    purpose: >
      Buscar duplicidad o adapter aplicable antes de crear un nuevo candidato.
    input_required:
      step_input: nombre_adapter_propuesta
    output_payload:
      duplicate_checked: true
      step_result: "PASS|BLOCKED"
      blocking_codes: []
    pass_condition:
      must_have_evidence: duplicate_checked
      must_not_be_generic: true
      must_match_step_purpose: true
      required_if_step_required: true
    block_condition:
      scope_bypass: true
      generic_payload: true
      missing_evidence: duplicate_checked
      invented_source_or_destination: true
    blocking_code: BLOCKED_DUPLICATE_CHECK_NOT_DONE
    required_evidence_keys:
      - duplicate_checked
      - step_result
      - blocking_codes
    next_if_pass: NEXT_BY_EXECUTION_ORDER
    next_if_blocked: RETURN_TO_WORKER_FOR_SELF_REPAIR_OR_BACKEND_CONFIG
    notes: "Contrato crítico — evita duplicidad de adapters."

