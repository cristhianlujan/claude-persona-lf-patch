<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">claude-persona workflow architecture</title>
  <desc id="desc">Workflow showing Claude orchestration, persona panel generation, agent-separated simulation, validation, analysis, and report artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#F8FBFF"/>
      <stop offset="100%" stop-color="#EEF6FF"/>
    </linearGradient>
    <linearGradient id="primary" x1="0" x2="1">
      <stop offset="0%" stop-color="#1455D9"/>
      <stop offset="100%" stop-color="#2B7FFF"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0B2545" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2D5C9F"/>
    </marker>
    <style>
      .title { font-family: Inter, Arial, sans-serif; font-size: 34px; font-weight: 800; fill: #0B2545; }
      .subtitle { font-family: Inter, Arial, sans-serif; font-size: 16px; fill: #49637F; }
      .lane { font-family: Inter, Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #1455D9; letter-spacing: .4px; }
      .box-title { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #0B2545; }
      .box-text { font-family: Inter, Arial, sans-serif; font-size: 13px; fill: #49637F; }
      .node { fill: #FFFFFF; stroke: #CFE0F5; stroke-width: 1.5; rx: 22; filter: url(#shadow); }
      .node-accent { fill: url(#primary); stroke: none; rx: 22; filter: url(#shadow); }
      .white-title { font-family: Inter, Arial, sans-serif; font-size: 18px; font-weight: 800; fill: #FFFFFF; }
      .white-text { font-family: Inter, Arial, sans-serif; font-size: 13px; fill: #EAF3FF; }
      .line { stroke: #2D5C9F; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #7FA6D9; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
      .pill { fill: #E8F1FF; stroke: #CFE0F5; stroke-width: 1; rx: 14; }
      .pill-text { font-family: Inter, Arial, sans-serif; font-size: 12px; font-weight: 700; fill: #1455D9; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)"/>
  <text x="60" y="70" class="title">claude-persona workflow architecture</text>
  <text x="60" y="98" class="subtitle">Hybrid skill: Claude orchestrates decisions; Python performs repeatable I/O, validation, analysis, and artifacts.</text>
  <text x="60" y="145" class="lane">INPUT &amp; ORCHESTRATION</text>
  <rect x="60" y="165" width="205" height="120" class="node-accent" rx="22"/>
  <text x="85" y="205" class="white-title">/persona command</text>
  <text x="85" y="232" class="white-text">generate · ask · concept-test</text>
  <text x="85" y="254" class="white-text">topic, market, count, options</text>
  <rect x="315" y="165" width="215" height="120" class="node" rx="22"/>
  <text x="340" y="205" class="box-title">SKILL.md contract</text>
  <text x="340" y="232" class="box-text">Routes intent and applies</text>
  <text x="340" y="254" class="box-text">the workflow rules.</text>
  <text x="585" y="145" class="lane">PANEL &amp; SIMULATION</text>
  <rect x="585" y="165" width="215" height="120" class="node" rx="22"/>
  <text x="610" y="205" class="box-title">Persona panel</text>
  <text x="610" y="232" class="box-text">manifest.json + persona files</text>
  <text x="610" y="254" class="box-text">market-specific diversity</text>
  <rect x="850" y="165" width="250" height="120" class="node" rx="22"/>
  <text x="875" y="205" class="box-title">Agent-separated calls</text>
  <text x="875" y="232" class="box-text">one subprocess per persona</text>
  <text x="875" y="254" class="box-text">Claude/Codex backend adapter</text>
  <text x="60" y="365" class="lane">VALIDATION &amp; CONTROL</text>
  <rect x="60" y="385" width="220" height="125" class="node" rx="22"/>
  <text x="85" y="425" class="box-title">Backend preflight</text>
  <text x="85" y="452" class="box-text">minimal JSON completion</text>
  <text x="85" y="474" class="box-text">abort before fan-out on fail</text>
  <rect x="330" y="385" width="235" height="125" class="node" rx="22"/>
  <text x="355" y="425" class="box-title">Response schema</text>
  <text x="355" y="452" class="box-text">required keys by survey type</text>
  <text x="355" y="474" class="box-text">retries on validation failure</text>
  <rect x="615" y="385" width="235" height="125" class="node" rx="22"/>
  <text x="640" y="425" class="box-title">Adherence scoring</text>
  <text x="640" y="452" class="box-text">voice, Big Five, plausibility</text>
  <text x="640" y="474" class="box-text">regenerate if score &lt; 7</text>
  <rect x="900" y="385" width="245" height="125" class="node" rx="22"/>
  <text x="925" y="425" class="box-title">Panel QA gate</text>
  <text x="925" y="452" class="box-text">count, uniqueness, diversity</text>
  <text x="925" y="474" class="box-text">slot adherence, similarity</text>
  <text x="60" y="590" class="lane">OUTPUTS &amp; REUSE</text>
  <rect x="60" y="610" width="230" height="78" class="node" rx="22"/>
  <text x="85" y="642" class="box-title">results.json</text>
  <text x="85" y="664" class="box-text">canonical persona responses</text>
  <rect x="330" y="610" width="230" height="78" class="node" rx="22"/>
  <text x="355" y="642" class="box-title">summary + CSV</text>
  <text x="355" y="664" class="box-text">aggregation, crosstabs, charts</text>
  <rect x="600" y="610" width="230" height="78" class="node" rx="22"/>
  <text x="625" y="642" class="box-title">report.md</text>
  <text x="625" y="664" class="box-text">executive narrative synthesis</text>
  <rect x="870" y="610" width="245" height="78" class="node" rx="22"/>
  <text x="895" y="642" class="box-title">run_metadata.json</text>
  <text x="895" y="664" class="box-text">traceability, latency, failures</text>
  <path d="M265 225 H315" class="line"/>
  <path d="M530 225 H585" class="line"/>
  <path d="M800 225 H850" class="line"/>
  <path d="M975 285 V385" class="line"/>
  <path d="M900 448 H850" class="dash"/>
  <path d="M615 448 H565" class="dash"/>
  <path d="M330 448 H280" class="dash"/>
  <path d="M170 510 V610" class="line"/>
  <path d="M455 510 V610" class="line"/>
  <path d="M735 510 V610" class="line"/>
  <path d="M1022 510 V610" class="line"/>
  <rect x="60" y="308" width="230" height="32" class="pill" rx="14"/>
  <text x="80" y="329" class="pill-text">Control: no valid output without validation</text>
  <rect x="850" y="308" width="250" height="32" class="pill" rx="14"/>
  <text x="870" y="329" class="pill-text">Isolation: independent persona context</text>
</svg>
