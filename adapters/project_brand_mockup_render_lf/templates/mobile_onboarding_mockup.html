<!-- Mobile onboarding mockup template -->
<div class="phone-frame" data-project="$project_code" data-screen="$screen_id">
  <header class="app-header">
    <span class="brand">$brand_name</span>
    <span class="step-chip">$step_label</span>
  </header>
  <main class="screen-body">
    <h1>$screen_title</h1>
    <p class="subtitle">$screen_subtitle</p>
    <section class="mockup-content">
      $components
    </section>
    <button class="primary-action">$primary_action</button>
    <a class="secondary-action">$secondary_action</a>
  </main>
</div>

<!-- Required CSS variables:
--brand-primary, --brand-header, --brand-active, --surface, --ink, --success, --warning, --error
-->
