<!-- Flow mockup board template -->
<section class="flow-board" data-project="$project_code" data-flow="$flow_code">
  <header class="board-header">
    <h1>$flow_name</h1>
    <div class="brand-strip">$design_system_code</div>
  </header>
  <div class="mockup-row">
    $screen_mockups
  </div>
  <aside class="legend">
    <span>EN_REVISION</span>
    <span>ARCHIVADO</span>
    <span>RIESGO_ALTO</span>
  </aside>
</section>

<!-- Rules:
max 4 mockups per board page;
use project tokens;
no generic colors;
show status chips;
include QA notes. -->
