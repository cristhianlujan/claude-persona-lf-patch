version: v0.1
adapter: ADAPTER_PROJECT_BRAND_MOCKUP_RENDER_LF
status: CANDIDATO

required:
  - project_code_declared
  - design_system_code_resolved
  - route_theme_tokens_read
  - screen_visual_specs_read_when_screen_based
  - project_tokens_used
  - mockup_frame_present
  - screen_state_present
  - qa_visual_done
  - readback_tokens_and_sources

