verdicts:
  - PASS_CANDIDATO_READ_ONLY
  - PASS_WITH_OBSERVATIONS
  - RETURN_TO_WORKER
  - FAIL_BRAND_MISMATCH
  - FAIL_GENERIC_MOCKUP
  - BLOCKED_SOURCE_MISSING
