name: lf-contract-check

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  lf-contract-check:
    name: lf-contract-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate LF contract
        run: |
          python3 scripts/lf_contract_check.py

      - name: Run LF validation engine self-test
        run: |
          python3 sandbox/lf_contract_gate_test/lf_validation_engine_v0_10_2_selftest.py
